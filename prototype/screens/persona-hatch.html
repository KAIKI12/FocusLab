<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FocusLab · 科研人格孵化</title>
<link rel="stylesheet" href="../assets/tokens.css" />
<link rel="stylesheet" href="../assets/base.css" />
<link rel="stylesheet" href="../assets/components.css" />
<style>
  body { padding: var(--sp-6) var(--sp-4); }
  .page { max-width: 720px; margin: 0 auto; }

  /* 页头 */
  .page-header { text-align: center; margin-bottom: var(--sp-8); }
  .back-link { display: inline-flex; align-items: center; gap: var(--sp-1); font-size: var(--fs-12); color: var(--color-text-muted); margin-bottom: var(--sp-4); cursor: pointer; }
  .back-link:hover { color: var(--color-primary); }
  .page-title { font-size: var(--fs-24); font-weight: var(--fw-semibold); margin-bottom: var(--sp-2); }
  .page-sub { font-size: var(--fs-14); color: var(--color-text-secondary); }

  /* 模拟天数切换 */
  .sim-bar { display: flex; justify-content: center; gap: var(--sp-2); margin-bottom: var(--sp-8); flex-wrap: wrap; }
  .sim-btn { height: 28px; padding: 0 var(--sp-3); border-radius: var(--r-pill); font-size: var(--fs-12); font-weight: var(--fw-medium); background: var(--color-bg-elevated); border: 1px solid var(--color-border); color: var(--color-text-secondary); cursor: pointer; transition: all var(--dur-base) var(--ease-smooth); }
  .sim-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .sim-btn.active { background: var(--color-primary); color: var(--color-text-on-primary); border-color: var(--color-primary); }

  /* 时间轴 */
  .timeline { position: relative; padding-left: 80px; }
  .timeline::before { content: ""; position: absolute; left: 39px; top: 20px; bottom: 20px; width: 2px; background: var(--color-border); }

  .tl-node { position: relative; margin-bottom: var(--sp-6); opacity: 0.4; transition: opacity var(--dur-slow) var(--ease-out); }
  .tl-node.past, .tl-node.current { opacity: 1; }
  .tl-node.future { opacity: 0.35; }

  /* 天数圆点 */
  .tl-dot { position: absolute; left: -41px; top: 18px; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; font-size: var(--fs-12); font-weight: var(--fw-semibold); color: #fff; background: var(--color-border-strong); transition: all var(--dur-slow) var(--ease-out); z-index: 1; }
  .tl-node.past .tl-dot { background: var(--color-success); }
  .tl-node.current .tl-dot { background: var(--color-primary); animation: pulse 2s infinite; }
  .tl-node.future .tl-dot { background: var(--color-border-strong); color: var(--color-text-muted); }

  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(79,140,255,0.4); } 50% { box-shadow: 0 0 0 8px rgba(79,140,255,0); } }

  .tl-day-label { position: absolute; left: -80px; top: 22px; width: 36px; text-align: right; font-size: var(--fs-12); font-weight: var(--fw-semibold); color: var(--color-text-secondary); white-space: nowrap; }

  /* 卡片 */
  .tl-card { background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--r-md); box-shadow: var(--shadow-card); padding: var(--sp-4) var(--sp-5); transition: transform var(--dur-slow) var(--ease-out), opacity var(--dur-slow) var(--ease-out); }
  .tl-node.current .tl-card { border-color: var(--color-primary); box-shadow: var(--shadow-card), 0 0 0 2px rgba(79,140,255,0.12); }
  .tl-emoji { font-size: var(--fs-20); margin-bottom: var(--sp-2); }
  .tl-title { font-size: var(--fs-16); font-weight: var(--fw-semibold); margin-bottom: var(--sp-2); }
  .tl-desc { font-size: var(--fs-14); color: var(--color-text-secondary); line-height: var(--lh-base); margin-bottom: var(--sp-3); }
  .tl-progress { display: flex; align-items: center; gap: var(--sp-3); }
  .tl-progress .progress { flex: 1; }
  .tl-progress-label { font-size: var(--fs-12); color: var(--color-text-muted); white-space: nowrap; flex-shrink: 0; }

  /* Day 7 迷你人格卡 */
  .persona-mini { background: linear-gradient(135deg, #1a0a2e, #6C5CE7); border-radius: var(--r-md); padding: var(--sp-5); color: #fff; margin-top: var(--sp-3); animation: popIn var(--dur-emph) var(--ease-out) both; }
  .persona-mini .pm-emoji { font-size: 48px; text-align: center; margin-bottom: var(--sp-2); }
  .persona-mini .pm-name { text-align: center; font-size: var(--fs-20); font-weight: var(--fw-bold); margin-bottom: var(--sp-1); }
  .persona-mini .pm-tag { text-align: center; font-size: var(--fs-12); opacity: 0.7; letter-spacing: 2px; margin-bottom: var(--sp-3); }
  .persona-mini .pm-quote { text-align: center; font-size: var(--fs-14); opacity: 0.85; margin-bottom: var(--sp-4); font-style: italic; }
  .persona-mini .pm-insight { font-size: var(--fs-12); opacity: 0.8; margin-bottom: var(--sp-4); padding: var(--sp-2) var(--sp-3); background: rgba(255,255,255,0.1); border-radius: var(--r-sm); }
  .pm-stats { display: flex; flex-direction: column; gap: var(--sp-2); margin-bottom: var(--sp-4); }
  .pm-stat { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--fs-12); }
  .pm-stat-name { width: 64px; opacity: 0.7; flex-shrink: 0; }
  .pm-stat-stars { letter-spacing: 1px; }
  .pm-stat-label { opacity: 0.6; font-size: 11px; }
  .pm-footer { text-align: center; font-size: var(--fs-12); opacity: 0.5; padding-top: var(--sp-3); border-top: 1px solid rgba(255,255,255,0.15); }
  .pm-unlock { text-align: center; font-size: var(--fs-14); margin-bottom: var(--sp-2); }

  @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* 底部 CTA */
  .cta-bar { text-align: center; margin-top: var(--sp-8); padding: var(--sp-6); background: var(--color-bg-elevated); border-radius: var(--r-md); border: 1px solid var(--color-border); box-shadow: var(--shadow-card); }
  .cta-text { font-size: var(--fs-16); color: var(--color-text-primary); margin-bottom: var(--sp-3); }
  .cta-link { display: inline-flex; align-items: center; gap: var(--sp-2); height: 36px; padding: 0 var(--sp-5); border-radius: var(--r-sm); background: var(--color-primary); color: var(--color-text-on-primary); font-size: var(--fs-14); font-weight: var(--fw-medium); cursor: pointer; transition: background var(--dur-base); }
  .cta-link:hover { background: var(--color-primary-dark); }

  /* 深色适配 */
  [data-theme="dark"] .persona-mini { background: linear-gradient(135deg, #0d0520, #4834a8); }

  /* 响应式 */
  @media (max-width: 560px) {
    body { padding: var(--sp-4) var(--sp-2); }
    .timeline { padding-left: 56px; }
    .timeline::before { left: 27px; }
    .tl-dot { left: -29px; width: 32px; height: 32px; font-size: 11px; }
    .tl-day-label { left: -56px; width: 24px; font-size: 11px; }
    .tl-card { padding: var(--sp-3) var(--sp-4); }
    .page-title { font-size: var(--fs-20); }
  }

  /* 主题切换 */
  .theme-sw { position: fixed; top: var(--sp-3); right: var(--sp-3); z-index: 90; }
</style>
</head>
<body>

<div class="theme-sw"><div class="theme-toggle" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'"></div></div>

<div class="page">
  <!-- 页头 -->
  <header class="page-header">
    <a class="back-link" href="main-today.html">← 返回今日计划</a>
    <h1 class="page-title">🥚 科研人格孵化中...</h1>
    <p class="page-sub">7 天数据积累,解锁你的专属科研人格</p>
  </header>

  <!-- 模拟天数切换 -->
  <nav class="sim-bar" id="simBar"></nav>

  <!-- 时间轴 -->
  <div class="timeline" id="timeline"></div>

  <!-- 底部 CTA -->
  <div class="cta-bar">
    <p class="cta-text">等不及? 快去完成今天的第一个番茄吧 🍅</p>
    <a class="cta-link" href="main-today.html">开始番茄钟 →</a>
  </div>
</div>

<script>
const DAYS = [
  { emoji:'🥚', title:'人格正在孵化中...', desc:'你刚刚加入 FocusLab,系统需要观察你的学习习惯。放心,每完成一个番茄钟,你的人格就更清晰一点。', pct:14, label:'进度 14% · 1 天数据' },
  { emoji:'🥚💫', title:'信号采集中', desc:'系统正在记录你的专注节奏 —— 你是晨型还是夜型?爆发型还是稳态型?数据正在说话。', pct:28, label:'进度 28% · 2 天数据' },
  { emoji:'🐣', title:'初步信号出现', desc:'初步信号显示,你可能是夜型生物。但还不够确定 —— 也许明天你会反转。', pct:42, label:'进度 42% · 3 天,夜间专注占比 65%' },
  { emoji:'🐣🔍', title:'特征识别中', desc:'检测到你的 DDL 响应模式:截止前 48 小时完成率骤升。系统开始缩小候选范围...', pct:57, label:'进度 57% · DDL 模式:临阵爆发' },
  { emoji:'🐥', title:'轮廓正在浮现', desc:'数据越来越清晰了...蝙蝠?猎豹?再等等,还有最后两天的数据要看。', pct:71, label:'进度 71% · 候选:🦇 🐆 🌋' },
  { emoji:'🐥✨', title:'即将揭晓', desc:'明天就可以解锁你的专属科研人格了!今天好好表现 —— 你的最终数据还在被记录。', pct:85, label:'进度 85% · 明日揭晓' },
  { emoji:'🎉', title:'解锁!你是「实验室蝙蝠」🦇', desc:'基于你 7 天的真实数据,这是你的专属科研人格。22 点之后你才真正上线,白天那个是替身。', pct:100, label:'进度 100% · 完成!' }
];

const PERSONA_CARD = `
<div class="persona-mini">
  <div class="pm-emoji">🦇</div>
  <div class="pm-name">实验室蝙蝠</div>
  <div class="pm-tag">B A T S</div>
  <div class="pm-quote">"22 点之后你才真正上线,白天那个是替身。"</div>
  <div class="pm-insight">🔍 深夜的图书馆是你的主场</div>
  <div class="pm-stats">
    <div class="pm-stat"><span class="pm-stat-name">时段偏好</span><span class="pm-stat-stars">★★★★★</span><span class="pm-stat-label">夜型</span></div>
    <div class="pm-stat"><span class="pm-stat-name">DDL模式</span><span class="pm-stat-stars">★★★☆☆</span><span class="pm-stat-label">临阵</span></div>
    <div class="pm-stat"><span class="pm-stat-name">稳定性</span><span class="pm-stat-stars">★★☆☆☆</span><span class="pm-stat-label">波动</span></div>
    <div class="pm-stat"><span class="pm-stat-name">强度</span><span class="pm-stat-stars">★★★★☆</span><span class="pm-stat-label">高产</span></div>
    <div class="pm-stat"><span class="pm-stat-name">多线程</span><span class="pm-stat-stars">★★☆☆☆</span><span class="pm-stat-label">单线</span></div>
  </div>
  <div class="pm-unlock">🎉 你的科研人格已解锁!<br><span style="font-size:12px;opacity:.7">下周还会变化哦~</span></div>
  <div class="pm-footer">FocusLab · 你是什么科研人格?</div>
</div>`;

let currentDay = 5;

function render(day) {
  currentDay = day;
  // 按钮
  const bar = document.getElementById('simBar');
  bar.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const b = document.createElement('button');
    b.className = 'sim-btn' + (i === day ? ' active' : '');
    b.textContent = 'Day ' + i;
    b.onclick = () => render(i);
    bar.appendChild(b);
  }
  // 时间轴
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  DAYS.forEach((d, idx) => {
    const n = idx + 1;
    const state = n < day ? 'past' : n === day ? 'current' : 'future';
    const node = document.createElement('div');
    node.className = 'tl-node ' + state;

    const dotContent = state === 'past' ? '✓' : n;
    let extra = '';
    if (n === 7 && (state === 'past' || state === 'current')) extra = PERSONA_CARD;

    node.innerHTML = `
      <span class="tl-day-label">Day ${n}</span>
      <span class="tl-dot">${dotContent}</span>
      <div class="tl-card">
        <div class="tl-emoji">${d.emoji}</div>
        <div class="tl-title">${d.title}</div>
        <div class="tl-desc">${d.desc}</div>
        <div class="tl-progress">
          <div class="progress"><div class="progress-bar${n===7?' success':''}" style="width:${state==='future'?0:d.pct}%"></div></div>
          <span class="tl-progress-label">${d.label}</span>
        </div>
        ${extra}
      </div>`;
    tl.appendChild(node);
  });
}

render(currentDay);
</script>
<script src="../assets/icons.js"></script>
</body>
</html>
