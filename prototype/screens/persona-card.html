<style>
  body { background: var(--color-bg); padding: 0; }

  /* ---- 页面容器 ---- */
  .page-wrap { max-width: 960px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) var(--sp-16); }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: var(--sp-6); flex-wrap: wrap; gap: var(--sp-4); }
  .page-head h1 { font-size: var(--fs-24); font-weight: var(--fw-semibold); letter-spacing: -0.3px; }
  .nav-back { color: var(--color-text-secondary); font-size: 13px; display: inline-flex; align-items: center; gap: 4px; }
  .nav-back:hover { color: var(--color-primary); }

  /* ---- 门 Tab 栏 ---- */
  .gate-tabs { display: flex; gap: var(--sp-2); overflow-x: auto; padding-bottom: var(--sp-2); margin-bottom: var(--sp-6); scrollbar-width: none; }
  .gate-tabs::-webkit-scrollbar { display: none; }
  .gate-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: var(--r-pill); font-size: var(--fs-14);
    background: var(--color-bg-elevated); border: 1px solid var(--color-border); cursor: pointer;
    transition: all var(--dur-base) var(--ease-smooth); white-space: nowrap; user-select: none;
  }
  .gate-tab:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .gate-tab.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

  /* ---- Gallery 网格 ---- */
  .gallery { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin-bottom: var(--sp-8); }
  .gallery-item {
    width: 80px; height: 80px; border-radius: var(--r-md); background: var(--color-bg-elevated);
    border: 2px solid var(--color-border); display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; gap: 2px;
    transition: transform var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
  }
  .gallery-item:hover { transform: scale(1.08); box-shadow: var(--shadow-float); }
  .gallery-item.active { border-color: var(--color-primary); box-shadow: var(--shadow-focus); }
  .gallery-item .gi-emoji { font-size: 28px; line-height: 1; }
  .gallery-item .gi-name { font-size: 10px; color: var(--color-text-secondary); text-align: center; line-height: 1.2; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- 分享卡预览区 ---- */
  .card-preview-wrap { display: flex; justify-content: center; margin-bottom: var(--sp-8); }

  /* ---- 分享卡片 360×540 ---- */
  .share-card {
    width: 360px; height: 540px; border-radius: var(--r-lg); overflow: hidden; position: relative;
    display: flex; flex-direction: column; padding: 24px 28px 20px; color: #fff;
    font-family: var(--font-sans); box-shadow: var(--shadow-modal);
    transition: background var(--dur-slow) var(--ease-out);
  }

  .sc-logo { width: 16px; height: 16px; border-radius: 4px; background: rgba(255,255,255,0.25); display: grid; place-items: center; font-size: 9px; font-weight: 700; }
  .sc-emoji { font-size: 56px; line-height: 1; margin-bottom: 10px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
  .sc-name { font-size: 24px; font-weight: var(--fw-bold); margin-bottom: 2px; }
  .sc-code { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--r-pill); background: rgba(255,255,255,0.15); margin-bottom: 12px; letter-spacing: 1px; font-family: var(--font-mono); }
  .sc-quote { font-size: 14px; line-height: 1.5; opacity: 0.88; margin-bottom: 8px; font-style: italic; }
  .sc-quote::before { content: '"'; }
  .sc-quote::after { content: '"'; }
  .sc-hidden { font-size: 11px; opacity: 0.55; margin-bottom: 14px; line-height: 1.4; }
  .sc-dims { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; font-size: 11px; }
  .sc-dim-row { display: flex; align-items: center; gap: 4px; }
  .sc-dim-label { width: 52px; flex-shrink: 0; opacity: 0.6; text-align: right; }
  .sc-dim-stars { letter-spacing: 1px; font-size: 12px; }
  .sc-dim-desc { opacity: 0.5; font-size: 10px; margin-left: 4px; }
  .sc-drift { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
  .sc-divider { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 0 0 10px; }
  .sc-footer { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; }
  .sc-footer-text { font-size: 10px; opacity: 0.5; line-height: 1.4; flex: 1; }
  .sc-qr { width: 40px; height: 40px; border-radius: 6px; background: rgba(255,255,255,0.15); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }

  /* 稀有门全息效果 */
  @keyframes hue-shift { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

  .combos-title { font-size: var(--fs-20); font-weight: var(--fw-semibold); margin-bottom: var(--sp-4); }
  .combos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--sp-3); }
  .combo-card {

  .combo-name { font-size: var(--fs-14); font-weight: var(--fw-semibold); }
  .combo-desc { font-size: var(--fs-12); color: var(--color-text-secondary); line-height: 1.4; }

  @media (max-width: 480px) {
    .page-wrap { padding: var(--sp-4) var(--sp-3) var(--sp-12); }

    .sc-emoji { font-size: 44px; }
    .sc-name { font-size: 20px; }

</style>

  if (arr.length === 2) return `linear-gradient(135deg, ${arr[0]}, ${arr[1]})`;
  const stops = arr.map((c, i) => `${c} ${Math.round(i / (arr.length - 1) * 100)}%`);
  return `linear-gradient(135deg, ${stops.join(', ')})`;
}

/* ======== 渲染 Tab ======== */
function renderTabs() {
  const el = document.getElementById('gateTabs');
  el.innerHTML = GATES.map((g, i) =>
    `<button class="gate-tab${i === currentGateIdx ? ' active' : ''}" data-idx="${i}">${g.emoji} ${g.name.replace('生物门','').replace('门','')}</button>`
  ).join('');
  el.querySelectorAll('.gate-tab').forEach(btn => {
    btn.onclick = () => { currentGateIdx = +btn.dataset.idx; renderTabs(); renderGallery(); };
  });
}

/* ======== 渲染 Gallery ======== */
function renderGallery() {
  const gate = GATES[currentGateIdx];
  if (!currentPersonaId || !gate.personas.find(p => p.id === currentPersonaId)) {
    currentPersonaId = gate.personas[0].id;
  }
  const el = document.getElementById('gallery');
  el.innerHTML = gate.personas.map(p =>
    `<div class="gallery-item${p.id === currentPersonaId ? ' active' : ''}" data-pid="${p.id}">
      <span class="gi-emoji">${p.emoji}</span>
      <span class="gi-name">${p.name}</span>
    </div>`
  ).join('');
  el.querySelectorAll('.gallery-item').forEach(item => {
    item.onclick = () => { currentPersonaId = item.dataset.pid; renderGallery(); };
  });
  renderCard();
}

/* ======== 渲染分享卡 ======== */
function renderCard() {
  const p = personaMap[currentPersonaId];
  if (!p) return;
  const card = document.getElementById('shareCard');
  card.style.background = gradientCSS(p.gate.gradient);
  card.classList.toggle('holo', p.gate.id === 'rare');

  document.getElementById('scEmoji').textContent = p.emoji;
  document.getElementById('scName').textContent = p.name;
  document.getElementById('scCode').textContent = p.id;
  document.getElementById('scQuote').textContent = p.quote;
  document.getElementById('scHidden').textContent = '🔍 隐藏属性: ' + p.hidden;

  const dimsEl = document.getElementById('scDims');
  dimsEl.innerHTML = p.dims.map((v, i) => {
    const desc = v >= 4 ? DIM_HIGH[i] : v <= 2 ? DIM_LOW[i] : '';
    return `<div class="sc-dim-row"><span class="sc-dim-label">${DIM_LABELS[i]}</span><span class="sc-dim-stars">${stars(v)}</span><span class="sc-dim-desc">${desc}</span></div>`;
  }).join('');

  // 漂移轨迹: 随机选一个同门或相邻门人格
  const allP = GATES.flatMap(g => g.personas);
  const other = allP.filter(x => x.id !== p.id);
  const prev = other[Math.floor(Math.random() * other.length)];
  document.getElementById('scDrift').textContent = `漂移轨迹: 上周 ${prev.emoji} → 本周 ${p.emoji}`;

  // 底部标签
  const ftEl = card.querySelector('.sc-footer-text');
  ftEl.innerHTML = `#FocusLab #${p.name}<br>你是什么科研人格?`;
}

/* ======== 渲染组合称号 ======== */
function renderCombos() {
  const el = document.getElementById('combosGrid');
  el.innerHTML = COMBOS.map(c => {
    const pa = personaMap[c.a], pb = personaMap[c.b];
    return `<div class="combo-card">
      <div class="combo-emojis">${pa ? pa.emoji : '?'} × ${pb ? pb.emoji : '?'}</div>
      <div class="combo-name">${c.name}</div>
      <div class="combo-desc">${c.desc}</div>
    </div>`;
  }).join('');
}

/* ======== 初始化 ======== */
renderTabs();
renderGallery();
renderCombos();
</script>
</body>
</html>
