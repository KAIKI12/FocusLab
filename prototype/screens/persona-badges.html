(function(){function apply(){try{var t=localStorage.getItem('fl-theme');var a=localStorage.getItem('fl-accent');var d=document.documentElement;if(t==='auto'){var pd=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;d.dataset.theme=pd?'dark':'light';}else if(t){d.dataset.theme=t;}if(a&&a!=='default'){d.dataset.accentTheme=a;}else{delete d.dataset.accentTheme;}}catch(e){}}apply();try{window.addEventListener('storage',function(e){if(e.key==='fl-theme'||e.key==='fl-accent')apply();});}catch(e){}})();

<style>
  body { background: var(--color-bg); padding: 0; }

  /* ---- 页面容器 ---- */
  .page-wrap { max-width: 960px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) var(--sp-16); }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: var(--sp-4); flex-wrap: wrap; gap: var(--sp-4); }
  .page-head h1 { font-size: var(--fs-24); font-weight: var(--fw-semibold); letter-spacing: -0.3px; }
  .page-subtitle { color: var(--color-text-secondary); font-size: var(--fs-14); margin-bottom: var(--sp-6); }
  .nav-back { color: var(--color-text-secondary); font-size: 13px; display: inline-flex; align-items: center; gap: 4px; text-decoration: none; }
  .nav-back:hover { color: var(--color-primary); }

  /* ---- 统计条 ---- */
  .stat-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--sp-3);
    background: var(--color-bg-elevated); border-radius: var(--r-md); padding: var(--sp-3) var(--sp-4);
    border: 1px solid var(--color-border); margin-bottom: var(--sp-6); box-shadow: var(--shadow-card);
  }
  .stat-unlocked { font-size: var(--fs-16); font-weight: var(--fw-semibold); color: var(--color-text-primary); }
  .stat-unlocked span { color: var(--color-primary); }
  .stat-rarity { display: flex; gap: var(--sp-3); font-size: var(--fs-14); color: var(--color-text-secondary); }
  .stat-rarity i { font-style: normal; }

  /* ---- 最近解锁 ---- */
  .recent-section { margin-bottom: var(--sp-6); }
  .section-label { font-size: var(--fs-14); font-weight: var(--fw-medium); color: var(--color-text-secondary); margin-bottom: var(--sp-3); }
  .recent-list { display: flex; gap: var(--sp-3); overflow-x: auto; padding-bottom: var(--sp-2); scrollbar-width: none; }
  .recent-list::-webkit-scrollbar { display: none; }
  .recent-card {
    flex-shrink: 0; display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-3) var(--sp-4);
    background: var(--color-bg-elevated); border-radius: var(--r-md); border: 1px solid var(--color-border);
    border-left: 3px solid var(--color-gold); box-shadow: var(--shadow-card); min-width: 180px;
  }
  .recent-emoji { font-size: 28px; line-height: 1; }
  .recent-info { display: flex; flex-direction: column; gap: 2px; }
  .recent-name { font-size: var(--fs-14); font-weight: var(--fw-medium); color: var(--color-text-primary); }
  .recent-date { font-size: var(--fs-12); color: var(--color-text-muted); }

  /* ---- Tab 栏 ---- */
  .cat-tabs { display: flex; gap: var(--sp-2); overflow-x: auto; padding-bottom: var(--sp-2); margin-bottom: var(--sp-6); scrollbar-width: none; }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: var(--r-pill); font-size: var(--fs-14);
    background: var(--color-bg-elevated); border: 1px solid var(--color-border); cursor: pointer;
    transition: all var(--dur-base) var(--ease-smooth); white-space: nowrap; user-select: none;
  }
  .cat-tab:hover { border-color: var(--color-primary); color: var(--color-primary); }
  .cat-tab.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

  /* ---- 徽章网格 ---- */
  .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4); margin-bottom: var(--sp-4); }
  @media (max-width: 600px) { .badge-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 400px) { .badge-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ---- 单个徽章 ---- */
  .badge-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .badge-circle {
    width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: 3px solid var(--color-border); background: var(--color-bg-elevated);
    transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
    position: relative; font-size: 32px; line-height: 1;
  }
  .badge-item:hover .badge-circle { transform: scale(1.1); }
  .badge-label { font-size: 12px; color: var(--color-text-secondary); text-align: center; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 稀有度边框 */
  .badge-circle.rarity-bronze { border-color: #CD7F32; }
  .badge-circle.rarity-silver { border-color: #C0C0C0; }
  .badge-circle.rarity-gold { border-color: #FFD700; box-shadow: 0 0 8px rgba(255, 215, 0, 0.35); }
  .badge-circle.rarity-diamond { border-color: #B87FFF; box-shadow: 0 0 12px rgba(184, 127, 255, 0.5); animation: diamond-pulse 2s ease-in-out infinite; }
  @keyframes diamond-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(184, 127, 255, 0.4); filter: hue-rotate(0deg); }
    50% { box-shadow: 0 0 18px rgba(184, 127, 255, 0.7); filter: hue-rotate(15deg); }
  }

  /* 未解锁 */
  .badge-circle.locked { background: var(--color-bg-hover); border-color: var(--color-border); }
  .badge-circle.locked .lock-icon { font-size: 20px; color: var(--color-text-muted); }
  .badge-circle.hidden-locked { background: #2a2a2e; border-color: #444; }
  .badge-circle.hidden-locked .lock-icon { font-size: 20px; }

  /* ---- 详情条 ---- */
  .badge-detail {
    grid-column: 1 / -1; background: var(--color-bg-elevated); border-radius: var(--r-md);
    border: 1px solid var(--color-border); padding: var(--sp-4); box-shadow: var(--shadow-card);
    animation: detail-in var(--dur-slow) var(--ease-out);
  }
  @keyframes detail-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .detail-head { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-2); flex-wrap: wrap; }
  .detail-emoji { font-size: 36px; line-height: 1; }
  .detail-name { font-size: var(--fs-16); font-weight: var(--fw-semibold); }
  .detail-rarity {
    font-size: 11px; padding: 2px 8px; border-radius: var(--r-pill); font-weight: var(--fw-medium);
    display: inline-block;
  }
  .detail-rarity.r-bronze { background: #fdf0e0; color: #CD7F32; }
  .detail-rarity.r-silver { background: #f0f0f0; color: #888; }
  .detail-rarity.r-gold { background: #fff8e0; color: #b8860b; }
  .detail-rarity.r-diamond { background: #f3eaff; color: #8a4fff; }
  .detail-cond { font-size: var(--fs-14); color: var(--color-text-secondary); margin-bottom: var(--sp-1); }
  .detail-quote { font-size: var(--fs-14); color: var(--color-text-primary); font-style: italic; margin-bottom: var(--sp-1); }
  .detail-quote::before { content: '"'; }
  .detail-quote::after { content: '"'; }
  .detail-date { font-size: var(--fs-12); color: var(--color-text-muted); }
  .detail-locked-msg { font-size: var(--fs-14); color: var(--color-text-muted); font-style: italic; }
</style>

const RARITY_LABEL = { bronze:'铜', silver:'银', gold:'金', diamond:'钻石' };
const RARITY_ICON = { bronze:'🟤', silver:'⚪', gold:'🟡', diamond:'💎' };

let activeCat = BADGE_CATS[0].id;
let openBadgeId = null;

/* ---- 统计 ---- */
function computeStats() {
  const all = BADGE_CATS.flatMap(c => c.badges);
  const unlocked = all.filter(b => b.unlocked);
  const rc = { bronze:0, silver:0, gold:0, diamond:0 };
  unlocked.forEach(b => rc[b.rarity]++);
  document.getElementById('statCount').textContent = `${unlocked.length} / ${all.length}`;
  const rEl = document.getElementById('statRarity');
  rEl.innerHTML = Object.entries(rc).map(([k,v]) => `<i>${RARITY_ICON[k]}${v}</i>`).join('');
}

/* ---- 最近解锁 ---- */
function renderRecent() {
  const all = BADGE_CATS.flatMap(c => c.badges).filter(b => b.unlocked && b.date);
  all.sort((a,b) => b.date.localeCompare(a.date));
  const top3 = all.slice(0, 3);
  document.getElementById('recentList').innerHTML = top3.map(b =>
    `<div class="recent-card"><span class="recent-emoji">${b.emoji}</span><div class="recent-info"><span class="recent-name">${b.name}</span><span class="recent-date">${b.date}</span></div></div>`
  ).join('');
}

/* ---- Tab ---- */
function renderTabs() {
  const el = document.getElementById('catTabs');
  el.innerHTML = BADGE_CATS.map(c =>
    `<div class="cat-tab${c.id === activeCat ? ' active' : ''}" data-cat="${c.id}">${c.name}</div>`
  ).join('');
  el.querySelectorAll('.cat-tab').forEach(tab => {
    tab.onclick = () => { activeCat = tab.dataset.cat; openBadgeId = null; renderTabs(); renderGrid(); };
  });
}

/* ---- 网格 ---- */
function renderGrid() {
  const cat = BADGE_CATS.find(c => c.id === activeCat);
  if (!cat) return;
  const grid = document.getElementById('badgeGrid');
  let html = '';
  cat.badges.forEach((b, i) => {
    const isHidden = b.isHidden && !b.unlocked;
    const isLocked = !b.unlocked && !b.isHidden;
    let circleClass = 'badge-circle';
    let inner = '';
    let label = '';
    if (b.unlocked) {
      circleClass += ` rarity-${b.rarity}`;
      inner = b.emoji;
      label = b.name;
    } else if (b.isHidden) {
      circleClass += ' hidden-locked';
      inner = '<span class="lock-icon">❓</span>';
      label = '隐藏';
    } else {
      circleClass += ' locked';
      inner = '<span class="lock-icon">🔒</span>';
      label = '???';
    }
    html += `<div class="badge-item" data-bid="${b.id}"><div class="${circleClass}">${inner}</div><span class="badge-label">${label}</span></div>`;
    /* 详情条插入 */
    if (openBadgeId === b.id) {
      html += renderDetail(b);
    }
  });
  grid.innerHTML = html;
  grid.querySelectorAll('.badge-item').forEach(item => {
    item.onclick = () => {
      const bid = item.dataset.bid;
      openBadgeId = openBadgeId === bid ? null : bid;
      renderGrid();
    };
  });
}

function renderDetail(b) {
  if (b.unlocked) {
    return `<div class="badge-detail">
      <div class="detail-head">
        <span class="detail-emoji">${b.emoji}</span>
        <span class="detail-name">${b.name}</span>
        <span class="detail-rarity r-${b.rarity}">${RARITY_ICON[b.rarity]} ${RARITY_LABEL[b.rarity]}</span>
      </div>
      <div class="detail-cond">达成条件: ${b.cond}</div>
      <div class="detail-quote">${b.quote}</div>
      <div class="detail-date">达成日期: ${b.date}</div>
    </div>`;
  }
  const condText = b.isHidden ? '???' : b.cond.replace(/./g, c => Math.random() > 0.4 ? c : '*');
  return `<div class="badge-detail">
    <div class="detail-head">
      <span class="detail-emoji">${b.isHidden ? '❓' : '🔒'}</span>
      <span class="detail-name">${b.isHidden ? '???' : '???'}</span>
      <span class="detail-rarity r-${b.rarity}">${RARITY_ICON[b.rarity]} ${RARITY_LABEL[b.rarity]}</span>
    </div>
    <div class="detail-cond">达成条件: ${condText}</div>
    <div class="detail-locked-msg">继续努力,你离这枚徽章又近了一步 💪</div>
  </div>`;
}

/* ---- 初始化 ---- */
computeStats();
renderRecent();
renderTabs();
renderGrid();
</script>
</body>
</html>
