# 三平台自动构建 + 发 Release
# 触发：push 形如 v0.1.0 / v1.2.3 的 tag
# 产出：Windows (.exe + .msi) / macOS (.dmg, arm64 + x64) / Linux (.deb + .AppImage)
# 上传到 GitHub Releases 草稿,需手动点 Publish 才公开

name: Release

on:
  push:
    tags:
      - "v*"

# 工作流内并发控制：同一 tag 重复 push 时取消旧任务
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
          # macOS Intel
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            name: macos-x64
          # Linux x64
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
          # Windows x64
          - platform: windows-latest
            args: ""
            name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux 系统依赖（Tauri 必需的 webkit/gtk 等）──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      # ── Rust 工具链 ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.name }}

      # ── Node + pnpm ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Tauri 构建 + 直接上传到 Release ──
      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FocusLab ${{ github.ref_name }}"
          releaseBody: |
            ## 📥 下载

            - **Windows**：选 `*-setup.exe`（推荐）或 `*.msi`
            - **macOS Apple Silicon**（M 系列芯片）：选 `*_aarch64.dmg`
            - **macOS Intel**：选 `*_x64.dmg`
            - **Linux**：选 `*.AppImage` 或 `*.deb`

            > ⚠️ macOS 用户首次启动若提示"无法验证开发者"，请右键应用 → 打开 → 仍然继续；
            > 或在「系统设置 → 隐私与安全性」点击"仍要打开"。
            > （未做 Apple 签名 / 公证，仅影响首次启动确认）

            ## 📋 更新内容

            <!-- 这里手动填写本版本变更，发布前编辑 -->
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
