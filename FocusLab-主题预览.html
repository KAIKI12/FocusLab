/* ============================================
   预览页面样式
   ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f0f0;
  padding: 24px;
}

h1 {
  text-align: center;
  font-size: 28px;
  color: #333;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #888;
  margin-bottom: 16px;
}

/* 筛选按钮 */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.filter-btn:hover {
  border-color: #999;
  background: #f5f5f5;
}

.filter-btn.active {
  background: #333;
  color: #fff;
  border-color: #333;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 24px;
  max-width: 1500px;
  margin: 0 auto;
}

/* ── 每个主题预览卡片 ── */
.theme-card {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
}

.theme-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.theme-label {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  background: #fff;
  color: #333;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-label .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  flex-shrink: 0;
}

.theme-label .desc {
  font-weight: 400;
  font-size: 11px;
  color: #999;
  margin-left: auto;
}

/* ── 模拟 FocusLab 界面 ── */
.mock-app {
  display: flex;
  height: 320px;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 13px;
}

.mock-sidebar {
  width: 170px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  padding: 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex-shrink: 0;
}

.mock-sidebar .app-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
  padding: 0 6px;
}

.mock-sidebar .nav-item {
  padding: 7px 10px;
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: default;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  white-space: nowrap;
}

.mock-sidebar .nav-item.active {
  background: var(--bg-hover);
  color: var(--text-primary);
  font-weight: 600;
}

.mock-main {
  flex: 1;
  padding: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.mock-main .page-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
}

/* 番茄钟卡片 */
.mock-timer-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.timer-ring {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 4px solid var(--border);
  border-top-color: var(--ring-focus);
  border-right-color: var(--ring-focus);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}

.timer-info { flex: 1; }

.timer-info .task-name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 3px;
  font-size: 13px;
}

.timer-info .task-sub {
  font-size: 11px;
  color: var(--text-secondary);
}

.timer-btn {
  padding: 6px 14px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: default;
}

/* 任务列表 */
.mock-tasks {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.mock-task {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
}

.mock-task .checkbox {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  position: relative;
}

.mock-task .checkbox.done {
  background: var(--success);
  border-color: var(--success);
}

.mock-task .checkbox.done::after {
  content: '✓';
  color: #fff;
  font-size: 10px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  line-height: 1;
}

.mock-task .task-text {
  flex: 1;
  color: var(--text-primary);
}

.mock-task .task-text.done-text {
  text-decoration: line-through;
  color: var(--text-secondary);
}

.mock-task .task-time {
  font-size: 11px;
  color: var(--text-secondary);
}

.mock-task .task-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--accent-light);
  color: var(--accent-dark);
  font-weight: 500;
}

/* 底部进度条 */
.mock-progress-bar {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-secondary);
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 60%;
  border-radius: 3px;
  background: var(--accent);
}

.grade-badges {
  display: flex;
  gap: 4px;
}

.grade-badge {
  width: 22px;
  height: 16px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
}

/* 色板 */
.swatch-row {
  display: flex;
  gap: 3px;
  padding: 8px 12px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.swatch-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.swatch {
  width: 26px;
  height: 16px;
  border-radius: 3px;
  border: 1px solid rgba(128,128,128,0.2);
}

.swatch-label {
  font-size: 8px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 1px;
  white-space: nowrap;
}

/* 响应式 */
@media (max-width: 500px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .mock-sidebar {
    width: 130px;
  }
}
</style>
</head>
<body>

<h1>🎯 FocusLab 主题预览</h1>
<p class="subtitle">11 套配色 × 亮/暗 = 22 套主题</p>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterThemes('all')">全部</button>

  <button class="filter-btn" onclick="filterThemes('neutral')">⚪ 中性色</button>
  <button class="filter-btn" onclick="filterThemes('pink')">🩷 粉色系</button>
</div>

<div class="grid" id="grid"></div>

<script>
const themeDefs = [

// 筛选功能
function filterThemes(filter) {
  // 更新按钮状态
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  const cards = document.querySelectorAll('.theme-card');
  cards.forEach(card => {
    const mode = card.dataset.mode;
    const temp = card.dataset.temp;
    let show = true;

    switch (filter) {
      case 'light':
        show = mode === 'light';
        break;
      case 'dark':
        show = mode === 'dark';
        break;
      case 'warm':
        show = temp === 'warm';
        break;
      case 'cool':
        show = temp === 'cool';
        break;
      case 'neutral':
        show = temp === 'neutral';
        break;
      case 'pink':
        show = temp === 'pink';
        break;
      case 'all':
      default:
        show = true;
    }

    card.style.display = show ? '' : 'none';
  });
}
