<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusLab</title>
    <script>
      /* fl-theme-init · 在 Vue 挂载前应用主题,避免初次渲染闪白 */
      (function () {
        function apply() {
          try {
            var t = localStorage.getItem("fl-theme");
            var a = localStorage.getItem("fl-accent");
            var d = document.documentElement;
            if (t === "auto") {
              var pd =
                window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches;
              d.dataset.theme = pd ? "dark" : "light";
            } else if (t) {
              d.dataset.theme = t;
            }
            if (a && a !== "default") {
              d.dataset.accentTheme = a;
            } else {
              delete d.dataset.accentTheme;
            }
          } catch (e) {}
        }
        apply();
        try {
          window.addEventListener("storage", function (e) {
            if (e.key === "fl-theme" || e.key === "fl-accent") apply();
          });
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
